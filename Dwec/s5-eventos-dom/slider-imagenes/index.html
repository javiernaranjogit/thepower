<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider de imágenes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Carrusel de imágenes</h1>
        <section class="slider" id="slider" aria-roledescription="carousel">
            <div class="track" id="track">
                <img src="https://picsum.photos/800/400?random=1" alt="Imagen 1">
                <img src="https://picsum.photos/800/400?random=2" alt="Imagen 2">
                <img src="https://picsum.photos/800/400?random=3" alt="Imagen 3">
                <img src="https://picsum.photos/800/400?random=4" alt="Imagen 4">
                <img src="https://picsum.photos/800/400?random=5" alt="Imagen 5">
            </div>

            <button class="nav nav--prev" id="prev" aria-label="Anterior">&#10094;</button>
            <button class="nav nav--next" id="next" aria-label="Siguiente">&#10095;</button>

            <div class="dots" id="dots" role="tablist"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
