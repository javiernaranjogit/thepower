<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor de fortaleza de contraseña</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor">
        <h1>Medidor de contraseña</h1>
        <p class="intro">Escribe una contraseña y comprueba su fortaleza en tiempo real.</p>

        <div class="campo-password">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="password" autocomplete="new-password" placeholder="Introduce tu contraseña">
                <button type="button" id="toggleVisibilidad" aria-label="Mostrar contraseña">Mostrar</button>
            </div>
        </div>

        <div class="medidor">
            <div class="barra">
                <div id="barraProgreso" class="barra-progreso"></div>
            </div>
            <p id="nivelTexto" class="nivel-texto">Introduce una contraseña</p>
        </div>

        <section class="sugerencias">
            <h2>Sugerencias de mejora</h2>
            <ul id="listaSugerencias">
                <li>Empieza a escribir para ver las sugerencias</li>
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
