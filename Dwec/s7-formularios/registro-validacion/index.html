<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro con validación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor">
        <h1>Crear cuenta</h1>
        <form id="formRegistro" novalidate>
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required minlength="2">
                <span class="error" data-error-for="nombre"></span>
            </div>

            <div class="campo">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required minlength="2">
                <span class="error" data-error-for="apellidos"></span>
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <span class="error" data-error-for="email"></span>
            </div>

            <div class="campo">
                <label for="email_confirm">Confirmar email</label>
                <input type="email" id="email_confirm" name="email_confirm" required>
                <span class="error" data-error-for="email_confirm"></span>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="8">
                <span class="error" data-error-for="password"></span>
            </div>

            <div class="campo">
                <label for="password_confirm">Confirmar contraseña</label>
                <input type="password" id="password_confirm" name="password_confirm" required>
                <span class="error" data-error-for="password_confirm"></span>
            </div>

            <div class="campo">
                <label for="fecha_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                <span class="error" data-error-for="fecha_nacimiento"></span>
            </div>

            <div class="campo">
                <label for="pais">País</label>
                <select id="pais" name="pais" required>
                    <option value="">-- Selecciona un país --</option>
                    <option value="ES">España</option>
                    <option value="MX">México</option>
                    <option value="AR">Argentina</option>
                    <option value="CO">Colombia</option>
                    <option value="CL">Chile</option>
                    <option value="PE">Perú</option>
                </select>
                <span class="error" data-error-for="pais"></span>
            </div>

            <div class="campo campo-check">
                <label>
                    <input type="checkbox" id="aceptar_terminos" name="aceptar_terminos" required>
                    Acepto los términos y condiciones
                </label>
                <span class="error" data-error-for="aceptar_terminos"></span>
            </div>

            <button type="submit">Registrarme</button>
        </form>

        <section id="tarjetaUsuario" class="tarjeta oculto">
            <h2>Registro completado</h2>
            <dl id="datosUsuario"></dl>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
